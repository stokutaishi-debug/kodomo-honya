<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こどもほんや 活動レポート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&display=swap');

  :root {
    --cream: #FBF7F0;
    --yellow: #FFE033;
    --yellow-light: #FFF5AA;
    --brown: #3B2A1A;
    --brown-mid: #7A5C3C;
    --brown-light: #C9A87A;
    --green: #5C8A5C;
    --green-light: #EAF3EA;
    --red: #C0392B;
    --red-light: #FDECEA;
    --blue: #2A6496;
    --blue-light: #EAF2F8;
    --border: #E0D4C0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
  }

  /* ── パスワード画面 ── */
  #lock-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--brown);
  }
  .lock-box {
    background: #fff;
    border-radius: 18px;
    padding: 48px 40px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.3);
  }
  .lock-icon { font-size: 3rem; margin-bottom: 12px; }
  .lock-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
    color: var(--brown);
    margin-bottom: 6px;
  }
  .lock-sub { font-size: .82rem; color: var(--brown-mid); margin-bottom: 28px; }
  .lock-input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: .15em;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--brown);
    background: var(--cream);
    margin-bottom: 14px;
  }
  .lock-input:focus { outline: none; border-color: var(--yellow); }
  .lock-btn {
    width: 100%;
    background: var(--yellow);
    color: var(--brown);
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: opacity .2s;
  }
  .lock-btn:hover { opacity: .85; }
  .lock-error {
    color: var(--red);
    font-size: .83rem;
    margin-top: 10px;
    display: none;
  }

  /* ── コンテンツ ── */
  #content { display: none; }

  header {
    background: var(--brown);
    color: var(--yellow);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.3rem;
  }
  .header-sub {
    font-size: .78rem;
    color: var(--brown-light);
    margin-left: auto;
  }

  main { padding: 28px 20px; max-width: 960px; margin: 0 auto; }

  .updated-badge {
    display: inline-block;
    background: var(--yellow-light);
    color: #7A6200;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: .78rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* ── Stats ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(59,42,26,.08);
  }
  .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
  .stat-label { font-size: .73rem; color: var(--brown-mid); margin-bottom: 4px; }
  .stat-value { font-size: 1.7rem; font-weight: 900; color: var(--brown); line-height: 1; }
  .stat-unit { font-size: .73rem; color: var(--brown-mid); margin-top: 2px; }

  /* ── Section ── */
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.1rem;
    color: var(--brown);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--yellow);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Event cards ── */
  .event-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(59,42,26,.07);
  }
  .event-name {
    font-family: 'Noto Serif JP', serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
  }
  .event-meta {
    font-size: .8rem;
    color: var(--brown-mid);
    margin-bottom: 14px;
  }
  .event-nums {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
  }
  .event-num {
    background: var(--cream);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .event-num-label { font-size: .72rem; color: var(--brown-mid); }
  .event-num-val { font-size: 1rem; font-weight: 700; }
  .profit-pos { color: var(--green); }
  .profit-neg { color: var(--red); }

  /* ── Donation table ── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th {
    background: var(--brown);
    color: var(--yellow);
    padding: 8px 12px;
    text-align: left;
    font-weight: 700;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:nth-child(even) td { background: #FDFAF5; }

  /* ── Summary donation ── */
  .don-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  .don-chip {
    background: var(--green-light);
    border-radius: 24px;
    padding: 8px 18px;
    font-size: .85rem;
    color: var(--green);
    font-weight: 700;
  }
  .don-chip span { font-size: .75rem; display: block; font-weight: 400; color: var(--brown-mid); }

  footer {
    text-align: center;
    padding: 32px;
    font-size: .78rem;
    color: var(--brown-mid);
  }
  footer a { color: var(--brown-mid); }

  .loading { text-align: center; padding: 40px; color: var(--brown-mid); }
  .error-msg { background: var(--red-light); color: var(--red); border-radius: 8px; padding: 16px; margin: 20px 0; font-size: .9rem; }
</style>
</head>
<body>

<!-- ── パスワード画面 ── -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-icon">📚</div>
    <div class="lock-title">こどもほんや</div>
    <div class="lock-sub">活動レポート<br>閲覧にはパスワードが必要です</div>
    <input class="lock-input" type="password" id="pw-input" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter')tryUnlock()">
    <button class="lock-btn" onclick="tryUnlock()">開く →</button>
    <div class="lock-error" id="pw-error">パスワードが違います</div>
  </div>
</div>

<!-- ── コンテンツ ── -->
<div id="content">
  <header>
    <span style="font-size:1.5rem;">📚</span>
    <h1>こどもほんや 活動レポート</h1>
    <span class="header-sub">ValueBooks ブックギフトプロジェクト</span>
  </header>

  <main>
    <div id="updated-badge" class="updated-badge"></div>

    <!-- 集計カード -->
    <div class="stats-grid" id="stats-grid">
      <div class="loading">読み込み中…</div>
    </div>

    <!-- イベント一覧 -->
    <div class="section-title">📅 開催実績</div>
    <div id="events-section"><div class="loading">読み込み中…</div></div>

    <!-- 寄付先 -->
    <div class="section-title" style="margin-top:32px;">🎁 寄付先・寄付実績</div>
    <div id="donation-section"><div class="loading">読み込み中…</div></div>
  </main>


    <!-- 記事 -->
    <div id="article-section"></div>

  <footer>
    このページは <a href="https://www.valuebooks.jp/" target="_blank">ValueBooks</a> が運営するこどもほんやプロジェクトの活動記録です。
  </footer>
</div>

<script>
// ══════════════════════════════════════════
//  ★ パスワードをここで設定してください ★
//  viewer.html をGitHubにアップする前に変更を！
const PASSWORD = 'kodomohonya2024';
// ══════════════════════════════════════════

// data.json のURL（GitHub Pages に合わせて自動解決）
// 同じリポジトリに data.json を置いてください
const DATA_URL = './data.json';

function tryUnlock() {
  const input = document.getElementById('pw-input').value;
  if (input === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    loadData();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => { err.style.display = 'none'; }, 2500);
  }
}

function fmt(n) { return Number(n||0).toLocaleString(); }

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('data.json が見つかりません（' + res.status + '）');
    const data = await res.json();
    renderAll(data);
  } catch(e) {
    document.getElementById('stats-grid').innerHTML =
      `<div class="error-msg">⚠️ データの読み込みに失敗しました。<br>${e.message}<br><br>GitHubに data.json がアップロードされているか確認してください。</div>`;
    document.getElementById('events-section').innerHTML = '';
    document.getElementById('donation-section').innerHTML = '';
  }
}

function renderAll(data) {
  // 更新日時
  if (data.exportedAt) {
    const d = new Date(data.exportedAt);
    const str = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 更新`;
    document.getElementById('updated-badge').textContent = '🕐 ' + str;
  }

  // 集計カード
  const s = data.summary || {};
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-label">開催回数</div><div class="stat-value">${s.totalEvents||0}</div><div class="stat-unit">回</div></div>
    <div class="stat-card"><div class="stat-icon">👧</div><div class="stat-label">参加のべ子ども数</div><div class="stat-value">${s.totalChildren||0}</div><div class="stat-unit">人</div></div>
    <div class="stat-card"><div class="stat-icon">📚</div><div class="stat-label">ON本 停止冊数（累計）</div><div class="stat-value">${fmt(s.totalOnBooks)}</div><div class="stat-unit">冊</div></div>
    <div class="stat-card"><div class="stat-icon">💴</div><div class="stat-label">ON本 金額（累計）</div><div class="stat-value">${fmt(s.totalOnAmt)}</div><div class="stat-unit">円</div></div>
    <div class="stat-card"><div class="stat-icon">🛒</div><div class="stat-label">子ども本屋売上（累計）</div><div class="stat-value">${fmt(s.totalSales)}</div><div class="stat-unit">円</div></div>
    <div class="stat-card"><div class="stat-icon">🎁</div><div class="stat-label">寄付総額（累計）</div><div class="stat-value">${fmt(s.totalDonations)}</div><div class="stat-unit">円</div></div>
  `;

  // イベント一覧
  const events = data.events || [];
  if (events.length === 0) {
    document.getElementById('events-section').innerHTML = '<p style="color:var(--brown-mid);font-size:.9rem;">まだイベントの記録がありません。</p>';
  } else {
    document.getElementById('events-section').innerHTML = events.slice().reverse().map(ev => {
      const profitClass = ev.profit >= 0 ? 'profit-pos' : 'profit-neg';
      return `<div class="event-card">
        <div class="event-name">${ev.name}</div>
        <div class="event-meta">📅 ${ev.date}　📍 ${ev.place||'—'}　👧 ${ev.childCount}人参加</div>
        <div class="event-nums">
          <div class="event-num"><div class="event-num-label">本屋売上</div><div class="event-num-val">${fmt(ev.shopSales||ev.sales)}円</div></div>
          <div class="event-num"><div class="event-num-label">収支</div><div class="event-num-val ${profitClass}">${ev.profit>=0?'+':''}${fmt(ev.profit)}円</div></div>
          <div class="event-num"><div class="event-num-label">ON本停止</div><div class="event-num-val">${fmt(ev.onbooks)}冊</div></div>
          <div class="event-num"><div class="event-num-label">ON本金額</div><div class="event-num-val">${fmt(ev.onamt)}円</div></div>
          ${ev.donPlan ? `<div class="event-num"><div class="event-num-label">寄付予定</div><div class="event-num-val">${fmt(ev.donPlan)}円</div></div>` : ''}
          ${ev.donTargetPlan ? `<div class="event-num"><div class="event-num-label">寄付先予定</div><div class="event-num-val" style="font-size:.85rem;">${ev.donTargetPlan}</div></div>` : ''}
        </div>
        ${ev.memo ? `<div style="margin-top:12px;font-size:.82rem;color:var(--brown-mid);">📝 ${ev.memo}</div>` : ''}
      </div>`;
    }).join('');
  }

  // 寄付先サマリー
  const donSum = data.donationSummary || [];
  const donations = data.donations || [];
  let donHTML = '';
  if (donSum.length > 0) {
    donHTML += '<div class="don-summary">' +
      donSum.map(d => `<div class="don-chip">${d.target}<span>累計 ${fmt(d.total)}円 / ${d.count}件</span></div>`).join('') +
      '</div>';
  }
  if (donations.length > 0) {
    donHTML += `<div class="tbl-wrap"><table>
      <thead><tr><th>寄付日</th><th>寄付先</th><th>金額</th><th>イベント</th></tr></thead>
      <tbody>
        ${donations.slice().reverse().map(d=>`<tr>
          <td>${d.date}</td>
          <td>${d.target}</td>
          <td style="font-weight:700;">${fmt(d.amount)}円</td>
          <td style="font-size:.82rem;color:var(--brown-mid);">${d.eventName||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
  }
  if (!donHTML) {
    donHTML = '<p style="color:var(--brown-mid);font-size:.9rem;">まだ寄付の記録がありません。</p>';
  }
  document.getElementById('donation-section').innerHTML = donHTML;

  // 記事セクション
  const artSection = document.getElementById('article-section');
  const articlesWithContent = (data.events||[]).filter(ev => ev.articleBlog || ev.articleSNS);
  if (articlesWithContent.length > 0) {
    let artHTML = '<div class="section-title" style="margin-top:32px;">📝 活動レポート記事</div>';
    articlesWithContent.slice().reverse().forEach(ev => {
      if (ev.articleBlog) {
        artHTML += `<div class="event-card">
          <div class="event-name">${ev.name} レポート</div>
          <div class="event-meta">📅 ${ev.date}</div>
          <div style="white-space:pre-wrap;line-height:1.8;font-size:.9rem;margin-top:12px;">${ev.articleBlog}</div>
          ${ev.articleSNS ? `<hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
          <div style="font-size:.8rem;font-weight:700;color:var(--brown-mid);margin-bottom:6px;">📱 SNS投稿文</div>
          <div style="white-space:pre-wrap;font-size:.88rem;background:var(--cream);padding:12px;border-radius:8px;">${ev.articleSNS}</div>` : ''}
        </div>`;
      }
    });
    artSection.innerHTML = artHTML;
  }

}
</script>
</body>
</html>
